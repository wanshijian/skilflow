version: '3.8'

services:
  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: skilflow-sandbox
    ports:
      - "8080:8080"
    environment:
      - SANDBOX_PORT=8080
      - MAX_EXECUTION_TIME=30
      - MAX_MEMORY_MB=256
    # 安全限制
    network_mode: none          # 禁用网络
    mem_limit: 256m             # 内存限制
    cpus: "0.5"                 # CPU 限制
    read_only: true             # 只读文件系统
    tmpfs:
      - /tmp:size=64M           # 仅 /tmp 可写
      - /sandbox/workspace:size=64M,uid=1000,gid=1000
    security_opt:
      - no-new-privileges:true  # 禁止提权
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 可选：任务队列（用于异步执行时）
  redis:
    image: redis:7-alpine
    container_name: skilflow-redis
    network_mode: none
    mem_limit: 64m
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data:
