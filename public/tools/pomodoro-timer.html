<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟 - Pomodoro Timer</title>
  <style>
    :root {
      --work: #e74c3c;
      --rest: #2ecc71;
      --bg: #1a1a2e;
      --card: #16213e;
      --text: #eee;
      --muted: #888;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .container {
      background: var(--card);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      width: 360px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .timer-ring {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto 28px;
    }
    svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }
    .ring-bg {
      fill: none;
      stroke: #2a2a4a;
      stroke-width: 8;
    }
    .ring-progress {
      fill: none;
      stroke: var(--work);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.4s ease, stroke 0.3s ease;
    }
    .time-display {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .time {
      font-size: 3.2rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      line-height: 1;
    }
    .label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .mode-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .mode-tab {
      flex: 1;
      padding: 10px 0;
      border-radius: 10px;
      border: 2px solid transparent;
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-tab.active[data-mode="work"] {
      border-color: var(--work);
      color: var(--work);
      background: rgba(231,76,60,0.1);
    }
    .mode-tab.active[data-mode="rest"] {
      border-color: var(--rest);
      color: var(--rest);
      background: rgba(46,204,113,0.1);
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    .btn-start {
      background: var(--work);
      color: #fff;
    }
    .btn-start:hover { filter: brightness(1.1); }
    .btn-pause {
      background: #f39c12;
      color: #fff;
    }
    .btn-reset {
      background: transparent;
      color: var(--muted);
      border: 2px solid #444;
      margin-top: 10px;
      font-size: 0.9rem;
    }
    .btn-reset:hover { border-color: #666; color: #aaa; }
    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .stats span { font-weight: 600; color: var(--text); }
  </style>
</head>
<body>
<div class="container">
  <h1>Pomodoro</h1>
  <p class="subtitle">保持专注，高效工作</p>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="work" onclick="switchMode('work')">工作 25分钟</button>
    <button class="mode-tab" data-mode="rest" onclick="switchMode('rest')">休息 5分钟</button>
  </div>

  <div class="timer-ring">
    <svg viewBox="0 0 220 220">
      <circle class="ring-bg" cx="110" cy="110" r="100"/>
      <circle class="ring-progress" id="ring" cx="110" cy="110" r="100"
              stroke-dasharray="628.32" stroke-dashoffset="0"/>
    </svg>
    <div class="time-display">
      <div class="time" id="timer">25:00</div>
      <div class="label" id="status">就绪</div>
    </div>
  </div>

  <button class="btn btn-start" id="btnMain" onclick="toggle()">开始专注</button>
  <button class="btn btn-reset" onclick="reset()">重置</button>

  <div class="stats">
    <div>已完成 <span id="count">0</span> 个番茄</div>
  </div>

  <audio id="alarm" preload="auto"></audio>
</div>

<script>
const WORK = 25 * 60;
const REST = 5 * 60;
const CIRC = 2 * Math.PI * 100; // 628.32

let mode = 'work';
let total = WORK;
let remaining = WORK;
let timer = null;
let count = 0;

const $time = document.getElementById('timer');
const $ring = document.getElementById('ring');
const $status = document.getElementById('status');
const $btn = document.getElementById('btnMain');
const $count = document.getElementById('count');
const $alarm = document.getElementById('alarm');
const tabs = document.querySelectorAll('.mode-tab');

function fmt(t) {
  const m = Math.floor(t / 60);
  const s = t % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function draw() {
  $time.textContent = fmt(remaining);
  const offset = CIRC - (remaining / total) * CIRC;
  $ring.style.strokeDashoffset = offset;
}

function switchMode(m) {
  if (timer) return;
  mode = m;
  total = m === 'work' ? WORK : REST;
  remaining = total;
  tabs.forEach(t => t.classList.toggle('active', t.dataset.mode === m));
  $ring.style.stroke = m === 'work' ? 'var(--work)' : 'var(--rest)';
  $btn.style.background = m === 'work' ? 'var(--work)' : 'var(--rest)';
  $btn.textContent = m === 'work' ? '开始专注' : '开始休息';
  $status.textContent = '就绪';
  draw();
}

function tick() {
  if (remaining <= 0) { finish(); return; }
  remaining--;
  draw();
  $status.textContent = mode === 'work' ? '专注中...' : '休息中...';
}

function toggle() {
  if (timer) { pause(); return; }
  timer = setInterval(tick, 1000);
  $btn.textContent = '暂停';
  $btn.className = 'btn btn-pause';
  $status.textContent = mode === 'work' ? '专注中...' : '休息中...';
}

function pause() {
  clearInterval(timer);
  timer = null;
  $btn.textContent = '继续';
  $btn.className = 'btn btn-start';
  $btn.style.background = mode === 'work' ? 'var(--work)' : 'var(--rest)';
  $status.textContent = '已暂停';
}

function finish() {
  clearInterval(timer);
  timer = null;
  beep();
  if (mode === 'work') {
    count++;
    $count.textContent = count;
  }
  const next = mode === 'work' ? 'rest' : 'work';
  mode = next;
  total = next === 'work' ? WORK : REST;
  remaining = total;
  tabs.forEach(t => t.classList.toggle('active', t.dataset.mode === next));
  $ring.style.stroke = next === 'work' ? 'var(--work)' : 'var(--rest)';
  $btn.className = 'btn btn-start';
  $btn.style.background = next === 'work' ? 'var(--work)' : 'var(--rest)';
  $btn.textContent = next === 'work' ? '开始专注' : '开始休息';
  $status.textContent = next === 'work' ? '工作完成，休息一下' : '休息结束，继续加油';
  draw();
}

function reset() {
  clearInterval(timer);
  timer = null;
  remaining = total;
  $btn.className = 'btn btn-start';
  $btn.style.background = mode === 'work' ? 'var(--work)' : 'var(--rest)';
  $btn.textContent = mode === 'work' ? '开始专注' : '开始休息';
  $status.textContent = '就绪';
  draw();
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.5);
    setTimeout(() => {
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.frequency.value = 1100;
      osc2.type = 'sine';
      gain2.gain.setValueAtTime(0.3, ctx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
      osc2.start(ctx.currentTime);
      osc2.stop(ctx.currentTime + 0.4);
    }, 600);
  } catch(e) {}
}

draw();
</script>
</body>
</html>
